name: Build and deploy to App Runner

# Builds the Docker image, pushes it to ECR, and lets App Runner auto-deploy
# the new image (the Terraform service has auto_deployments_enabled = true and
# watches the `latest` tag). A start-deployment call is included as a fallback.
#
# Required repo configuration (Settings -> Secrets and variables -> Actions):
#   Variables:  AWS_REGION, ECR_REPOSITORY, APPRUNNER_SERVICE_ARN
#   Secrets:    AWS_DEPLOY_ROLE_ARN   (an IAM role trusting GitHub OIDC)
on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  id-token: write
  contents: read

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_DEPLOY_ROLE_ARN }}
          aws-region: ${{ vars.AWS_REGION }}

      - name: Log in to Amazon ECR
        id: ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build and push image
        env:
          REGISTRY: ${{ steps.ecr.outputs.registry }}
          REPOSITORY: ${{ vars.ECR_REPOSITORY }}
          IMAGE_TAG: ${{ github.sha }}
        run: |
          docker build -t "$REGISTRY/$REPOSITORY:$IMAGE_TAG" -t "$REGISTRY/$REPOSITORY:latest" .
          docker push "$REGISTRY/$REPOSITORY:$IMAGE_TAG"
          docker push "$REGISTRY/$REPOSITORY:latest"

      - name: Trigger App Runner deployment
        if: ${{ vars.APPRUNNER_SERVICE_ARN != '' }}
        run: |
          aws apprunner start-deployment \
            --service-arn "${{ vars.APPRUNNER_SERVICE_ARN }}" \
            --region "${{ vars.AWS_REGION }}"
