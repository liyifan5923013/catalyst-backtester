name: Build and deploy to App Runner

# Builds the Docker image and pushes it to ECR. App Runner has
# auto_deployments_enabled = true and watches the `latest` tag, so pushing the
# image is what triggers the rollout (no explicit StartDeployment needed).
#
# Required repo configuration (Settings -> Secrets and variables -> Actions):
#   Variables:  AWS_REGION, ECR_REPOSITORY
#   Secrets:    AWS_DEPLOY_ROLE_ARN   (an IAM role trusting GitHub OIDC)
on:
  push:
    branches: [main]
    # Skip rebuilds for changes that don't affect the running app. Note the
    # hosted one-pager lives in frontend/public, so it is NOT ignored.
    paths-ignore:
      - "**.md"
      - "docs/**"
      - "deploy/**"
      - ".gitignore"
  workflow_dispatch:

permissions:
  id-token: write
  contents: read

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_DEPLOY_ROLE_ARN }}
          aws-region: ${{ vars.AWS_REGION }}

      - name: Log in to Amazon ECR
        id: ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build and push image
        env:
          REGISTRY: ${{ steps.ecr.outputs.registry }}
          REPOSITORY: ${{ vars.ECR_REPOSITORY }}
          IMAGE_TAG: ${{ github.sha }}
        run: |
          docker build -t "$REGISTRY/$REPOSITORY:$IMAGE_TAG" -t "$REGISTRY/$REPOSITORY:latest" .
          docker push "$REGISTRY/$REPOSITORY:$IMAGE_TAG"
          docker push "$REGISTRY/$REPOSITORY:latest"

      - name: Deployment note
        run: echo "Pushed :latest - App Runner auto-deploys the new image (auto_deployments_enabled)."
