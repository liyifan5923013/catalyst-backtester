# Local dev stack: Postgres + the backtester app.
# Brings up a persistent market-data store and runs migrations on app start.
# Uses plain Postgres (matches RDS). The schema also runs on TimescaleDB if you
# swap the image to timescale/timescaledb:latest-pg16 (the migration auto-creates
# hypertables when the extension is available).
services:
  db:
    image: postgres:16
    environment:
      POSTGRES_USER: catalyst
      POSTGRES_PASSWORD: catalyst
      POSTGRES_DB: catalyst
    ports:
      - "5432:5432"
    volumes:
      - tsdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U catalyst -d catalyst"]
      interval: 5s
      timeout: 5s
      retries: 10

  app:
    build: .
    environment:
      DATABASE_URL: postgresql://catalyst:catalyst@db:5432/catalyst
      PORT: "7860"
    ports:
      - "7860:7860"
    depends_on:
      db:
        condition: service_healthy

volumes:
  tsdata:
